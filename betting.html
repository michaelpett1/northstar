    <script>
        const { createApp } = Vue;

        const pageData = {
            bettingStrategy: [

                { title: 'Best Football Betting Strategies', url: 'https://www.gambling.com/strategy/betting/football', image: 'https://objects.kaxmedia.com/genesis/football-strategy.webp', author: 'Shannon Lane', authorImg: 'https://objects.kaxmedia.com/auto/o/208729/f283797b46.webp', excerpt: 'Proven football betting strategies including over/under, both teams to score and Asian handicaps.', category: 'Football', timeAgo: '3 hours ago' },
                { title: 'Horse Racing Betting Strategies', url: 'https://www.gambling.com/strategy/betting/horse-racing', image: 'https://objects.kaxmedia.com/genesis/horse-racing-betting-strategy-guide.webp', author: 'Diarmuid Nolan', authorImg: 'https://objects.kaxmedia.com/auto/o/62754/420fa1c919.png', excerpt: 'From studying form to understanding going conditions, master the fundamentals of horse racing betting.', category: 'Horse Racing', timeAgo: '1 day ago' },

                { title: 'Each-Way Betting: How It Works', url: 'https://www.gambling.com/strategy/betting/each-way-bet', image: 'https://objects.kaxmedia.com/genesis/each-way-betting-strategies-guide.webp', author: 'Diarmuid Nolan', authorImg: 'https://objects.kaxmedia.com/auto/o/62754/420fa1c919.png', excerpt: 'Understand how each-way bets split into win and place components, and when they offer the best value.', category: 'Each-Way', timeAgo: '3 days ago' },

                { title: 'How to Read a Racing Form Card', url: 'https://www.gambling.com/strategy/betting/racing-form', image: 'https://objects.kaxmedia.com/genesis/horse-racing-betting-strategy-guide.webp', author: 'Diarmuid Nolan', authorImg: 'https://objects.kaxmedia.com/auto/o/62754/420fa1c919.png', excerpt: 'Decode the numbers, abbreviations and symbols on a racing form card like a professional punter.', category: 'Horse Racing', timeAgo: '4 days ago' },

        };

        /* ── NewsFeatured ── */
        const NewsFeatured = {
            props: { article: { type: Object, required: true }, badgeText: { type: String, default: 'TRENDING' }, badgeColor: { type: String, default: 'gdc-red' } },

                        </div>
                        <div class="p-6 flex flex-col justify-center relative">
                            <span class="absolute top-4 right-4 bg-gdc-red text-white text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">

                    </div>
                </div>
            </a>`,
        };

        /* ── NewsCard ── */
        const NewsCard = {
            props: { article: { type: Object, required: true } },
            template: `
            <a :href="article.url" class="block no-underline text-inherit hover:no-underline group">
                <div class="bg-white rounded-xl border border-[#ECECEF] overflow-hidden h-full flex flex-col transition-shadow duration-200 group-hover:shadow-[0_4px_16px_rgba(0,0,0,0.08)]">

                        <div class="w-full h-full bg-cover bg-center transition-transform duration-300 group-hover:scale-105" :style="{ backgroundImage: 'url(' + article.image + ')' }"></div>

                        <p class="text-sm text-gdc-deep-grey leading-relaxed line-clamp-2 mt-auto">{{ article.excerpt }}</p>
                    </div>
                </div>
            </a>`,
        };

        /* ── NewsSidebar ── */
        const NewsSidebar = {
            props: { strategyArticles: { type: Array, required: true }, guideArticles: { type: Array, required: true } },
            data() { return { activeTab: 'popular' }; },
            computed: {
                displayedArticles() {
                    if (this.activeTab === 'popular') return this.strategyArticles.slice(0, 5);
                    return [...this.guideArticles.slice(0, 3), ...this.strategyArticles.slice(3, 5)];
                },
            },
            template: `
            <div class="sticky top-20 bg-white rounded-xl border border-[#ECECEF] overflow-hidden">
                <div class="flex border-b border-[#ECECEF]">
                    <button @click="activeTab = 'popular'" :class="['flex-1 flex items-center justify-center gap-1.5 py-3 text-sm font-bold transition-colors cursor-pointer border-none', activeTab === 'popular' ? 'bg-gdc-black text-white' : 'bg-white text-gdc-deep-grey hover:bg-gray-50']">

                <div class="divide-y divide-[#ECECEF]">

                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-semibold leading-snug text-black group-hover:text-gdc-blue transition-colors line-clamp-2 m-0">{{ article.title }}</h4>
                            <span v-if="article.category" class="inline-block mt-1.5 text-xs font-bold text-gdc-blue border border-gdc-blue rounded px-2 py-0.5">{{ article.category }}</span>

        };

        /* ── SiteHeader ── */
        const SiteHeader = {

                        <button class="bg-transparent border-none cursor-pointer p-0 text-black flex items-center" aria-label="Search">

                { label: 'Guides', href: 'https://www.gambling.com/guides', current: true },
                { label: 'News', href: 'https://www.gambling.com/news', current: false },
                { label: 'Inside Gambling.com', href: 'https://www.gambling.com/inside', current: false },

        /* ── RewardsBanner ── */
        const RewardsBanner = {
            data() { return { isLoggedIn: false }; },
            template: `
